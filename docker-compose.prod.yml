# MoodMap — Production Docker Compose
#
# Build context is the project ROOT (.) not ./backend, so the Dockerfile can copy
# backend/ as a package and `from backend.X import ...` resolves inside containers.
#
# Start order:
#   docker compose -f docker-compose.prod.yml up -d
#
# Celery queue tiers (all three must be listed or high/low tasks never drain):
#   high    — analyze_entry, run_immediate_crisis_nudge, run_immediate_agent_check
#   default — fallback
#   low     — run_nightly_agent_check (nightly batch)

x-backend-defaults: &backend-defaults
  build:
    context: .
    dockerfile: backend/Dockerfile
  restart: unless-stopped
  env_file:
    - ./backend/.env
  depends_on:
    redis:
      condition: service_healthy
  networks:
    - moodmap_net
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

services:

  # ── API ──────────────────────────────────────────────────────────
  api:
    <<: *backend-defaults
    command:
      - uvicorn
      - backend.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --workers
      - "4"
      - --loop
      - uvloop
      - --http
      - httptools
      - --worker-connections
      - "1000"
      - --timeout-keep-alive
      - "30"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g

  # ── Celery Worker ────────────────────────────────────────────────
  # Drains all three priority tiers. ML models are memory-heavy so
  # concurrency is kept low and each worker child is recycled after 50 tasks.
  celery-worker:
    <<: *backend-defaults
    command:
      - celery
      - -A
      - backend.celery_app
      - worker
      - -Q
      - high,default,low
      - --loglevel=info
      - --concurrency=2
      - --max-tasks-per-child=50
      - --time-limit=600
      - --soft-time-limit=540
    deploy:
      resources:
        limits:
          memory: 4g    # torch + transformers need headroom

  # ── Celery Beat ──────────────────────────────────────────────────
  # Single instance only — running multiple beats would fire nightly tasks N times.
  # Schedule state is persisted to a named volume so restarts don't re-fire tasks.
  celery-beat:
    <<: *backend-defaults
    command:
      - celery
      - -A
      - backend.celery_app
      - beat
      - --loglevel=info
      - --schedule
      - /beat/celerybeat-schedule
    volumes:
      - celerybeat_schedule:/beat
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Redis ────────────────────────────────────────────────────────
  # Internal only — no port binding. Password enforced via REDIS_PASSWORD env var.
  # AOF persistence means cached data and rate-limit state survive restarts.
  redis:
    image: redis:7-alpine
    restart: always
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - moodmap_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 600m

# ── Networks ──────────────────────────────────────────────────────
# All backend services are on an isolated internal network.
# Only `api` exposes a port to the host.
networks:
  moodmap_net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local
  celerybeat_schedule:
    driver: local
