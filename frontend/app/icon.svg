<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="MoodMap">
  <!-- Dark rounded badge so the gold mark has contrast on light browser tabs -->
  <rect width="32" height="32" rx="7" fill="#0e0d0b"/>
  <!-- Mood wave: traces an "M" silhouette via two soft peaks -->
  <path d="M 5 22 Q 10 5, 14 16 T 22 16 T 27 22"
        stroke="#c8a96e"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
