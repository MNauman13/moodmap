name: MoodMap CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend — test & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SUPABASE_URL: https://placeholder.supabase.co
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          CLOUDFLARE_R2_ENDPOINT: https://placeholder.r2.cloudflarestorage.com
          CLOUDFLARE_R2_ACCESS_KEY_ID: placeholder
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: placeholder
          CLOUDFLARE_R2_BUCKET_NAME: moodmap-audio
          ANTHROPIC_API_KEY: placeholder
          RESEND_API_KEY: placeholder
        run: pytest -v --tb=short

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          BACKEND_URL: http://localhost:8000
        run: npm run build
